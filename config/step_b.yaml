teacher_model: "Qwen/Qwen3.5-9B"
provider: "vllm"                     # "vllm" for local GPU, "precomputed" for testing
tensor_parallel_size: 1              # increase for multi-GPU
max_model_len: 4096
dtype: "bfloat16"                    # 7B model fits in bfloat16 on 48GB A40 (~14GB VRAM)
enable_thinking: false               # disable thinking mode for faster, cleaner output
sampling:
  temperature: 0.7
  top_p: 0.8
  max_tokens: 256
rationale: true                      # false for label-only (faster)
