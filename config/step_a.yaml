loop: 1
variations_per_seed: 1
diversity:
  person: low          # low / medium / high
  background: low
  angle_deg: 5         # max deviation from seed camera angle
  chinstrap_delta: 0   # 0=keep, 1=slight, 2=moderate
api:
  provider: "diffusers"                          # "diffusers" for local, "dummy" for testing
  model: "black-forest-labs/FLUX.2-klein-4B"
  num_inference_steps: 50
  guidance_scale: 4.0
  output_format: "png"                           # png / jpeg
  batch_size: 1                                  # images per pipeline call; increase to 4-8 on high-VRAM GPUs
